services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: cv_backend
    restart: unless-stopped
    environment:
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8080"
      SERVER_THREADS: "4"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - cv_network

  python_service:
    build:
      context: ./python_service
      dockerfile: Dockerfile
    container_name: cv_python_service
    restart: unless-stopped
    environment:
      PORT: "8081"
      MODEL_PATH: "/app/trained_model.pkl"
    ports:
      - "8081:8081"
    # The .pkl is COPY'd into the image at build time. To swap the model:
    #   docker compose build python_service && docker compose up -d python_service
    # Or uncomment the volume below for hot-swap (the file must exist on host
    # BEFORE you run `docker compose up` or Docker will create an empty dir):
    # volumes:
    #   - ./python_service/trained_model.pkl:/app/trained_model.pkl:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - cv_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runtime
      args:
        BACKEND_URL: "http://backend:8080"
        # Inside the compose network, services are reachable via their service
        # name as the hostname — that's why this is `python_service`, not
        # `localhost` or the container_name.
        PYTHON_SERVICE_URL: "http://python_service:8081"
    container_name: cv_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
      python_service:
        condition: service_healthy
    networks:
      - cv_network

networks:
  cv_network:
    driver: bridge